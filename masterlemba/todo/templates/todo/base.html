<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>TODO - {% block titulo %}{% endblock titulo %}</title>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark mb-2">
        <div class="container-md d-flex justify-content-between">
            <a class="navbar-brand" href="{% url 'todo_list'%}">TODO</a>
            {% if request.user.is_authenticated %}
                <span class="navbar-text text-success">
                    Bem-vindo, {{ request.user.username }}!
                </span>
                <form method="post" action="{% url 'logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-sm">Sair</button>
                </form>
            {% else %}
                <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Entrar</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block conteudo %}{% endblock conteudo %}
    </main>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-cVKIPhG5F0dG5WbN0P1C63EL7f8aYtFsv7sF5ggF3/dq0kl83EfLV3x6mOyc8V8H" crossorigin="anonymous"></script>
  </body>
</html>
