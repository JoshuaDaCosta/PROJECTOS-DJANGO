{% extends "exe1/base.html" %}

{% block title %} editar post {% endblock%}
{% block content %}
<h1>Editar Post {{ post.titulo }}</h1>
<form method="POST">
  {% csrf_token %}
  <input type="text" name="titulo" value="{{ post.titulo }}">
  <textarea name="conteudo">{{ post.conteudo }}</textarea>
  <button type="submit">Atualizar</button>
</form>
{% endblock %}
