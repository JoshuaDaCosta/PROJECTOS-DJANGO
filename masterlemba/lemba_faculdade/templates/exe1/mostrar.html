<!-- lemba_faculdade/templates/exe1/mostrar.html -->
{% extends "exe1/base.html" %}

{% block title %}Posts{% endblock %}

{% block content %}
<h1>Posts</h1>

{% for post in posts %}
    <h2>{{ post.titulo }}</h2>
    <p>{{ post.conteudo }}</p>
    <hr>
    <a href="{% url 'editar_post' post.id %}">Editar</a> |
    <a href="{% url 'deletar_post' post.id %}">Deletar</a>
{% empty %}
    <p>Não há posts ainda.</p>
{% endfor %}

{% endblock %}
